<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sıla Hanıma Sorum Var</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #6baae6 0%, #000000 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .container {
            background: #d3c8d6;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
            z-index: 1;
        }

        #ana-gorsel {
            width: 100%;
            max-width: 350px;
            border-radius: 35px;
            margin-bottom: 40px;
        }

        h1 {
            color: #000000;
            font-size: 24px;
            margin-bottom: 30px;
        }

        .butonlar {
            display: flex;
            justify-content: center;
            gap: 20px;
            height: 50px;
            align-items: center;
        }

        button {
            padding: 25px 50px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 50px;
            transition: all 0.3s ease;
        }

        #evet {
            background-color: #000000;
            color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        #evet:hover {
            transform: scale(1.1);
            background-color: #920303;
        }

        #hayir {
            background-color: #000000;
            color: rgb(255, 255, 255);
            position: absolute; 
            z-index: 1000;
        }

        /* Final GIF Alanı Stili */
        #final-gif-alani {
            display: none;
            text-align: center;
        }

        #final-gif {
            width: 100%;
            max-width: 300px;
            border-radius: 15px;
        }

        /* Kalp Patlaması Stili */
        .kalp-efekti {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            animation: ucur 1.5s ease-out forwards;
        }

        @keyframes ucur {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) scale(0.2) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container" id="ana-kutu">
        <!-- Başlangıç Görseli -->
        <img src="assd.jpg" alt="Sürpriz" id="ana-gorsel">
        
        <!-- Soru -->
        <h1 id="soru">Sıla Hanım Kahve İçmeye Ne Dersiniz??</h1>
        
        <div class="butonlar">
            <button id="evet">Evet!</button>
            <button id="hayir">Hayır</button>
        </div>

        <!-- Tıklandıktan Sonra Çıkacak GIF Alanı -->
        <div id="final-gif-alani">
            <!-- Buraya o süresiz oynayacak GIF'i ekle kanka -->
            <img src="happy.gif.webp" id="final-gif" alt="Kutlama GIF">
            <h2 style="color: #000000; margin-top: 20px;">HABERLESELİMM Mİİ O ZAMAN 🦅</h2>
        </div>
    </div>

    <script>
        const hayir = document.getElementById('hayir');
        const evet = document.getElementById('evet');
        const soru = document.getElementById('soru');
        const anaGorsel = document.getElementById('ana-gorsel');
        const butonlar = document.querySelector('.butonlar');
        const finalAlani = document.getElementById('final-gif-alani');

        // Hayır butonunun kaçma mantığı
        hayir.addEventListener('mouseover', () => {
            const x = Math.random() * (window.innerWidth - hayir.clientWidth);
            const y = Math.random() * (window.innerHeight - hayir.clientHeight);
            
            hayir.style.left = `${x}px`;
            hayir.style.top = `${y}px`;
        });

        // Kalp Patlatma Fonksiyonu (Yoğun ve Büyük)
        function kalpPatlat(e) {
            const kalpSayisi = 250; // Yoğunluk tavan
            for (let i = 0; i < kalpSayisi; i++) {
                const kalp = document.createElement('div');
                kalp.className = 'kalp-efekti';
                
                const emojiler = ['🦅', '🦁', '🔥', '🌸', '✨'];
                kalp.innerText = emojiler[Math.floor(Math.random() * emojiler.length)];
                
                // Dağılma Alanı
                const x = (Math.random() - 0.5) * window.innerWidth * 0.7;
                const y = (Math.random() - 0.5) * window.innerHeight * 0.7;
                
                // Rastgele Büyüklük (Büyük yaptık)
                const rastgeleBoyut = Math.floor(Math.random() * 30) + 40; 
                kalp.style.fontSize = rastgeleBoyut + 'px';
                
                kalp.style.setProperty('--x', `${x}px`);
                kalp.style.setProperty('--y', `${y}px`);
                
                kalp.style.left = e.clientX + 'px';
                kalp.style.top = e.clientY + 'px';
                
                document.body.appendChild(kalp);
                
                setTimeout(() => {
                    kalp.remove();
                }, 3000);
            }
        }

        // Evet butonuna basınca olacaklar
        evet.addEventListener('click', (e) => {
            // 1. Kalpleri fırlat
            kalpPatlat(e);

            // 2. Eski elemanları temizle
            anaGorsel.style.display = 'none';
            soru.style.display = 'none';
            butonlar.style.display = 'none';
            hayir.style.display = 'none';

            // 3. GIF alanını göster
            finalAlani.style.display = 'block';
        });
    </script>
</body>
</html>
