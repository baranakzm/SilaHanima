<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Soruyoorum</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #6baae6 0%, #000000 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        .container {
            background: #d3c8d6;
            padding: 25px; /* Padding'i azalttık */
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 320px; /* Kutuyu daralttık */
            width: 85%;
            z-index: 1;
        }

        #ana-gorsel {
            width: 100%;
            max-width: 250px; /* Fotoğrafı küçülttük */
            border-radius: 20px;
            margin-bottom: 20px;
            object-fit: cover;
        }

        h1 {
            color: #000000;
            font-size: 18px; /* Fontu küçülttük */
            margin-bottom: 20px;
            line-height: 1.4;
        }

        .butonlar {
            display: flex;
            justify-content: center;
            gap: 15px;
            height: 45px;
            align-items: center;
        }

        button {
            padding: 12px 25px; /* Butonları kibarlaştırdık */
            font-size: 16px; /* Buton yazısını küçülttük */
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 25px;
            transition: all 0.2s ease;
        }

        #evet {
            background-color: #000000;
            color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        #hayir {
            background-color: #9e0303;
            color: white;
            position: absolute; 
            z-index: 1000;
            transition: none !important;
            touch-action: none;
            white-space: nowrap; /* Yazı taşmasın */
        }

        #final-gif-alani {
            display: none;
            text-align: center;
        }

        #final-gif {
            width: 100%;
            max-width: 200px; /* Final GIF'ini de küçülttük */
            border-radius: 15px;
        }

        h2 {
            font-size: 16px; /* Final mesajını küçülttük */
            color: #000000;
            margin-top: 15px;
        }

        .kalp-efekti {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            animation: ucur 1.5s ease-out forwards;
        }

        @keyframes ucur {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) scale(0.2) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container" id="ana-kutu">
        <img src="assd.jpg" alt="Sürpriz" id="ana-gorsel">
        <h1 id="soru">Sıla Hanım Kahve İçmeye Ne Dersiniz??</h1>
        
        <div class="butonlar">
            <button id="evet">Evet!</button>
            <button id="hayir">Hayır</button>
        </div>

        <div id="final-gif-alani">
            <img src="happy.gif.webp" id="final-gif" alt="Kutlama GIF">
            <h2 id="final-mesaj">HABERLESELİMM Mİİ O ZAMAN 🦅</h2>
        </div>
    </div>

    <script>
        const hayir = document.getElementById('hayir');
        const evet = document.getElementById('evet');
        const soru = document.getElementById('soru');
        const anaGorsel = document.getElementById('ana-gorsel');
        const butonlar = document.querySelector('.butonlar');
        const finalAlani = document.getElementById('final-gif-alani');

        function kac(e) {
            if (e) e.preventDefault();
            
            // Butonun ekran sınırlarından taşmasını engellemek için daha sıkı paylar
            const maxX = window.innerWidth - hayir.offsetWidth - 20;
            const maxY = window.innerHeight - hayir.offsetHeight - 20;
            
            const x = Math.max(10, Math.random() * maxX);
            const y = Math.max(10, Math.random() * maxY);
            
            hayir.style.position = 'fixed';
            hayir.style.left = `${x}px`;
            hayir.style.top = `${y}px`;
        }

        hayir.addEventListener('mouseover', kac);
        hayir.addEventListener('touchstart', kac, {passive: false});
        hayir.addEventListener('click', (e) => { e.preventDefault(); kac(); });

        function kalpPatlat(e) {
            const kalpSayisi = 80; // Kasmasın diye biraz daha azalttık ama hala bol
            const clientX = e.clientX || (e.touches ? e.touches[0].clientX : window.innerWidth/2);
            const clientY = e.clientY || (e.touches ? e.touches[0].clientY : window.innerHeight/2);

            for (let i = 0; i < kalpSayisi; i++) {
                const kalp = document.createElement('div');
                kalp.className = 'kalp-efekti';
                const emojiler = ['🦅', '🦁', '🔥', '🌸', '✨'];
                kalp.innerText = emojiler[Math.floor(Math.random() * emojiler.length)];
                
                const x = (Math.random() - 0.5) * window.innerWidth * 0.8;
                const y = (Math.random() - 0.5) * window.innerHeight * 0.8;
                
                const rastgeleBoyut = Math.floor(Math.random() * 15) + 20; 
                kalp.style.fontSize = rastgeleBoyut + 'px';
                kalp.style.setProperty('--x', `${x}px`);
                kalp.style.setProperty('--y', `${y}px`);
                
                kalp.style.left = clientX + 'px';
                kalp.style.top = clientY + 'px';
                
                document.body.appendChild(kalp);
                setTimeout(() => { kalp.remove(); }, 1500);
            }
        }

        evet.addEventListener('click', (e) => {
            kalpPatlat(e);
            anaGorsel.style.display = 'none';
            soru.style.display = 'none';
            butonlar.style.display = 'none';
            hayir.style.display = 'none';
            finalAlani.style.display = 'block';
        });
    </script>
</body>
</html>
